name: 613-home

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8613}:8613"
    entrypoint: ["/bin/sh", "-ec"]
    command: |
      cat >/etc/caddy/Caddyfile <<'EOF'
      {
          admin off
      }

      :8613 {
          header /sw.js Cache-Control "no-cache, no-store, must-revalidate"

          handle /api/hebcal/* {
              uri strip_prefix /api/hebcal
              reverse_proxy hebcal-service:3001 {
                  header_up X-Forwarded-Proto {scheme}
                  name: 613-home

                  services:
                    app:
                      build:
                        context: https://github.com/Wbbdlr/613.git#${GIT_REF:-main}
                        dockerfile: app/Dockerfile
                      restart: unless-stopped
                      ports:
                        - "${HTTP_PORT:-8613}:8613"
                      environment:
                        - NODE_ENV=production
                        - PORT=8613
                        - APP_DATA_DIR=/data
                        - SEFARIA_DATA_DIR=/data/sefaria
                        - JWT_SECRET=${JWT_SECRET:-change_me_jwt_secret_in_production}
                      volumes:
                        - app_data:/data

                  volumes:
                    app_data:
      CREATE INDEX IF NOT EXISTS bookmarks_user_idx  ON bookmarks(user_id);
      CREATE INDEX IF NOT EXISTS history_user_idx    ON reading_history(user_id);
      EOF
      exec docker-entrypoint.sh postgres
    environment:
      - POSTGRES_USER=sefaria
      - POSTGRES_PASSWORD=sefaria
      - POSTGRES_DB=sefaria
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
      - MEILI_ENV=production
    volumes:
      - meili_data:/meili_data
    expose:
      - "7700"

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  meili_data:
  sefaria_data: