services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8613}:8613"
    entrypoint: ["/bin/sh", "-ec"]
    command: |
      cat >/etc/caddy/Caddyfile <<'EOF'
      {
          admin off
      }

      :8613 {
          # Service Worker must not be cached so browsers always get the latest version
          header /sw.js Cache-Control "no-cache, no-store, must-revalidate"

          # Hebcal API
          handle /api/hebcal/* {
              uri strip_prefix /api/hebcal
              reverse_proxy hebcal-service:3001 {
                  header_up X-Forwarded-Proto {scheme}
                  header_up X-Real-IP {remote_host}
              }
          }

          # Sefaria API
          handle /api/sefaria/* {
              uri strip_prefix /api/sefaria
              reverse_proxy sefaria-service:3002 {
                  header_up X-Forwarded-Proto {scheme}
                  header_up X-Real-IP {remote_host}
              }
          }

          # Frontend (React SPA — must be last / catch-all)
          handle {
              reverse_proxy frontend:3000 {
                  header_up X-Forwarded-Proto {scheme}
                  header_up X-Real-IP {remote_host}
              }
          }
      }
      EOF
      exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - hebcal-service
      - sefaria-service

  frontend:
    image: ghcr.io/wbbdlr/613-frontend:${IMAGE_TAG:-stable}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "3000"

  hebcal-service:
    image: ghcr.io/wbbdlr/613-hebcal-service:${IMAGE_TAG:-stable}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
    expose:
      - "3001"

  sefaria-service:
    image: ghcr.io/wbbdlr/613-sefaria-service:${IMAGE_TAG:-stable}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://sefaria:sefaria@db:5432/sefaria
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
      - SEFARIA_DATA_DIR=/data/sefaria
      - JWT_SECRET=${JWT_SECRET:-change_me_jwt_secret_in_production}
    volumes:
      - sefaria_data:/data/sefaria
    expose:
      - "3002"
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-ec"]
    command: |
      cat >/docker-entrypoint-initdb.d/init.sql <<'EOF'
      -- Registered users
      CREATE TABLE IF NOT EXISTS users (
          id            SERIAL PRIMARY KEY,
          username      TEXT NOT NULL UNIQUE,
          password_hash TEXT NOT NULL,
          created_at    TIMESTAMPTZ DEFAULT now()
      );

      -- User notes on Sefaria passages
      CREATE TABLE IF NOT EXISTS notes (
          id          SERIAL PRIMARY KEY,
          user_id     INT  NOT NULL REFERENCES users(id) ON DELETE CASCADE,
          ref         TEXT NOT NULL,
          text        TEXT NOT NULL,
          created_at  TIMESTAMPTZ DEFAULT now(),
          updated_at  TIMESTAMPTZ DEFAULT now()
      );

      -- Highlights on Sefaria passages
      CREATE TABLE IF NOT EXISTS highlights (
          id          SERIAL PRIMARY KEY,
          user_id     INT  NOT NULL REFERENCES users(id) ON DELETE CASCADE,
          ref         TEXT NOT NULL,
          start_word  INT  NOT NULL,
          end_word    INT  NOT NULL,
          color       TEXT NOT NULL DEFAULT 'yellow',
          note        TEXT,
          created_at  TIMESTAMPTZ DEFAULT now()
      );

      -- Bookmarks (unique per user + ref)
      CREATE TABLE IF NOT EXISTS bookmarks (
          id          SERIAL PRIMARY KEY,
          user_id     INT  NOT NULL REFERENCES users(id) ON DELETE CASCADE,
          ref         TEXT NOT NULL,
          label       TEXT,
          created_at  TIMESTAMPTZ DEFAULT now(),
          UNIQUE(user_id, ref)
      );

      -- Reading history
      CREATE TABLE IF NOT EXISTS reading_history (
          id          SERIAL PRIMARY KEY,
          user_id     INT  NOT NULL REFERENCES users(id) ON DELETE CASCADE,
          ref         TEXT NOT NULL,
          visited_at  TIMESTAMPTZ DEFAULT now()
      );

      CREATE INDEX IF NOT EXISTS notes_user_idx      ON notes(user_id);
      CREATE INDEX IF NOT EXISTS notes_ref_idx       ON notes(user_id, ref);
      CREATE INDEX IF NOT EXISTS highlights_user_idx ON highlights(user_id);
      CREATE INDEX IF NOT EXISTS highlights_ref_idx  ON highlights(user_id, ref);
      CREATE INDEX IF NOT EXISTS bookmarks_user_idx  ON bookmarks(user_id);
      CREATE INDEX IF NOT EXISTS history_user_idx    ON reading_history(user_id);
      EOF
      exec docker-entrypoint.sh postgres
    environment:
      - POSTGRES_USER=sefaria
      - POSTGRES_PASSWORD=sefaria
      - POSTGRES_DB=sefaria
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sefaria"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
      - MEILI_ENV=production
    volumes:
      - meili_data:/meili_data
    expose:
      - "7700"

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  meili_data:
  sefaria_data:
