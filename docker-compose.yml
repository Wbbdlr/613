name: 613-home

services:
  app:
    build:
      context: https://github.com/Wbbdlr/613.git#${GIT_REF:-main}
      dockerfile: app/Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8613}:8613"
    environment:
      - NODE_ENV=production
      - PORT=8613
      - APP_DATA_DIR=/data
      - SEFARIA_DATA_DIR=/data/sefaria
      - JWT_SECRET=${JWT_SECRET:-change_me_jwt_secret_in_production}
    volumes:
      - app_data:/data

volumes:
  app_data:
