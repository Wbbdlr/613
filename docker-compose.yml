version: "3.9"

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - sefaria-service

  frontend:
    build:
      context: ./frontend
      target: runner
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "3000"

  sefaria-service:
    build:
      context: ./sefaria-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://sefaria:sefaria@db:5432/sefaria
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
      - SEFARIA_DATA_DIR=/data/sefaria
    volumes:
      - ./sefaria-data:/data/sefaria
    expose:
      - "3002"
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sefaria
      - POSTGRES_PASSWORD=sefaria
      - POSTGRES_DB=sefaria
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sefaria"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
      - MEILI_ENV=production
    volumes:
      - meili_data:/meili_data
    expose:
      - "7700"

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  meili_data:
