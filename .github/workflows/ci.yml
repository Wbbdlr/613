name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # ── Build all Docker images with layer caching ─────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: false
          load: true
          tags: 613-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build hebcal-service
        uses: docker/build-push-action@v6
        with:
          context: ./hebcal-service
          push: false
          load: true
          tags: 613-hebcal:ci
          cache-from: type=gha,scope=hebcal
          cache-to: type=gha,mode=max,scope=hebcal

      - name: Build sefaria-service
        uses: docker/build-push-action@v6
        with:
          context: ./sefaria-service
          push: false
          load: true
          tags: 613-sefaria:ci
          cache-from: type=gha,scope=sefaria
          cache-to: type=gha,mode=max,scope=sefaria

  # ── Unit / Testcontainers tests ────────────────────────────────────────────
  unit-test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            hebcal-service/package-lock.json
            sefaria-service/package-lock.json

      - name: Install hebcal-service dependencies
        working-directory: hebcal-service
        run: npm ci

      - name: Run hebcal-service tests
        working-directory: hebcal-service
        run: npm test

      - name: Install sefaria-service dependencies (incl. devDependencies)
        working-directory: sefaria-service
        run: npm ci

      - name: Run sefaria-service tests (Testcontainers PostgreSQL)
        working-directory: sefaria-service
        run: npm test
        env:
          # Increase Docker wait to handle slower CI runners
          TESTCONTAINERS_RYUK_DISABLED: "false"

  # ── Full-stack integration smoke tests ────────────────────────────────────
  integration:
    name: Full-stack smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for hebcal-service health
        run: |
          timeout 120 bash -c \
            'until curl -sf http://localhost/api/hebcal/health; do echo "waiting…"; sleep 3; done'

      - name: Wait for sefaria-service health
        run: |
          timeout 120 bash -c \
            'until curl -sf http://localhost/api/sefaria/health; do echo "waiting…"; sleep 3; done'

      - name: Smoke-test hebcal endpoints
        run: |
          curl -sf "http://localhost/api/hebcal/health" | grep -q '"status":"ok"'
          curl -sf "http://localhost/api/hebcal/calendar/events?year=2024&month=3" | grep -q '"events"'
          curl -sf "http://localhost/api/hebcal/calendar/parsha?date=2024-03-16" | grep -q '"date"'
          curl -sf "http://localhost/api/hebcal/calendar/dafyomi?date=2024-03-15" | grep -q '"date"'
          curl -sf "http://localhost/api/hebcal/calendar/nach?date=2024-03-15" | grep -q '"date"'
          curl -sf "http://localhost/api/hebcal/calendar/holidays?year=2024" | grep -q '"events"'
          curl -sf "http://localhost/api/hebcal/zmanim?city=New+York&date=2024-03-15" | grep -q '"sunrise"'

      - name: Smoke-test sefaria endpoints
        run: |
          curl -sf "http://localhost/api/sefaria/health" | grep -q '"status":"ok"'
          curl -sf "http://localhost/api/sefaria/texts/books" | grep -q '"books"'
          curl -sf "http://localhost/api/sefaria/notes?ref=Genesis+1:1" | python3 -c "import sys,json; json.load(sys.stdin)"
          curl -sf "http://localhost/api/sefaria/notes/bookmarks" | python3 -c "import sys,json; json.load(sys.stdin)"
          curl -sf "http://localhost/api/sefaria/search?q=test" | grep -q '"hits"'

      - name: Smoke-test frontend
        run: |
          curl -sf http://localhost/ | grep -qi '613'

      - name: Print service logs on failure
        if: failure()
        run: docker compose logs --tail=100
