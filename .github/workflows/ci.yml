name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # ── Build all Docker images with layer caching ─────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner  # multi-stage: dev → build → runner (serves static dist/ via `serve`)
          push: false
          load: true
          tags: 613-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build hebcal-service
        uses: docker/build-push-action@v6
        with:
          context: ./hebcal-service
          push: false
          load: true
          tags: 613-hebcal:ci
          cache-from: type=gha,scope=hebcal
          cache-to: type=gha,mode=max,scope=hebcal

      - name: Build db image
        uses: docker/build-push-action@v6
        with:
          context: ./db
          push: false
          load: true
          tags: 613-db:ci
          cache-from: type=gha,scope=db
          cache-to: type=gha,mode=max,scope=db

      - name: Build sefaria-service
        uses: docker/build-push-action@v6
        with:
          context: ./sefaria-service
          push: false
          load: true
          tags: 613-sefaria:ci
          cache-from: type=gha,scope=sefaria
          cache-to: type=gha,mode=max,scope=sefaria

  # ── Unit / Testcontainers tests ────────────────────────────────────────────
  unit-test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            hebcal-service/package-lock.json
            sefaria-service/package-lock.json

      - name: Install hebcal-service dependencies
        working-directory: hebcal-service
        run: npm ci

      - name: Run hebcal-service tests
        working-directory: hebcal-service
        run: npm test

      - name: Install sefaria-service dependencies (incl. devDependencies)
        working-directory: sefaria-service
        run: npm ci

      - name: Run sefaria-service tests (Testcontainers PostgreSQL)
        working-directory: sefaria-service
        run: npm test
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"

  # ── Full-stack integration smoke tests ────────────────────────────────────
  integration:
    name: Full-stack smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image for production compose
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: false
          load: true
          tags: ghcr.io/wbbdlr/613-frontend:stable

      - name: Build hebcal-service image for production compose
        uses: docker/build-push-action@v6
        with:
          context: ./hebcal-service
          push: false
          load: true
          tags: ghcr.io/wbbdlr/613-hebcal-service:stable

      - name: Build db image for production compose
        uses: docker/build-push-action@v6
        with:
          context: ./db
          push: false
          load: true
          tags: ghcr.io/wbbdlr/613-db:stable

      - name: Build sefaria-service image for production compose
        uses: docker/build-push-action@v6
        with:
          context: ./sefaria-service
          push: false
          load: true
          tags: ghcr.io/wbbdlr/613-sefaria-service:stable

      - name: Copy env file
        run: cp .env.example .env

      - name: Start full stack
        run: docker compose -f docker-compose.yml up -d

      - name: Wait for sefaria-service health
        run: |
          timeout 120 bash -c \
            'until curl -sf http://localhost:8613/api/sefaria/health; do echo "waiting…"; sleep 3; done'

      - name: Smoke-test sefaria endpoints
        run: |
          curl -sf "http://localhost:8613/api/sefaria/health" | grep -q '"status":"ok"'
          curl -sf "http://localhost:8613/api/sefaria/texts/books" | grep -q '"books"'

      - name: Smoke-test auth endpoints
        run: |
          curl -sf -X POST "http://localhost:8613/api/sefaria/auth/register" \
            -H "Content-Type: application/json" \
            -d '{"username":"testuser","password":"testpass1"}' | grep -q '"token"'
          TOKEN=$(curl -sf -X POST "http://localhost:8613/api/sefaria/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"username":"testuser","password":"testpass1"}' | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          curl -sf "http://localhost:8613/api/sefaria/notes?ref=Genesis+1:1" \
            -H "Authorization: Bearer $TOKEN" | grep -q '\[\|\]'
          curl -sf "http://localhost:8613/api/sefaria/notes/bookmarks" \
            -H "Authorization: Bearer $TOKEN" | grep -q '\[\|\]'
          curl -sf "http://localhost:8613/api/sefaria/search?q=test" | grep -q '"hits"'

      - name: Smoke-test frontend
        run: |
          curl -sf http://localhost:8613/ | grep -qi '613'

      - name: Print service logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --tail=100
