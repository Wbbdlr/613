name: Publish Docker images

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push images to ghcr.io
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
            build-args: "target=runner"
            target: runner
          - service: hebcal-service
            context: ./hebcal-service
            target: ""
          - service: sefaria-service
            context: ./sefaria-service
            target: ""

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/613-${{ matrix.service }}:stable
            ghcr.io/${{ github.repository_owner }}/613-${{ matrix.service }}:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/{0}/613-{1}:{2}', github.repository_owner, matrix.service, github.ref_name) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
