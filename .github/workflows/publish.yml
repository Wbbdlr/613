name: Publish Docker images

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push images to ghcr.io
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: app
            context: .
            dockerfile: ./app/Dockerfile
            target: ""

    steps:
      - uses: actions/checkout@v4

      - name: Prepare OCI metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/613-${{ matrix.service }}
          tags: |
            type=raw,value=stable
            type=raw,value=latest
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=613-${{ matrix.service }}
            org.opencontainers.image.description=613 self-hosted suite ${{ matrix.service }} image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Verify anonymous pull of stable image
        run: |
          docker logout ghcr.io || true
          docker pull ghcr.io/${{ github.repository_owner }}/613-${{ matrix.service }}:stable
