# Development overrides – build locally with bind-mount source for hot reload
services:
  proxy:
    ports:
      - "${HTTP_PORT:-8613}:8613"
    # Override inline config with local file for easy Caddyfile editing during dev
    configs: []
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"

  hebcal-service:
    build:
      context: ./hebcal-service
    volumes:
      - ./hebcal-service:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    ports:
      - "3001:3001"
    command: ["node", "--watch", "src/index.js"]

  sefaria-service:
    build:
      context: ./sefaria-service
    volumes:
      - ./sefaria-service:/app
      - /app/node_modules
      - ./sefaria-data:/data/sefaria
    environment:
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
    ports:
      - "3002:3002"
    command: ["node", "--watch", "src/index.js"]

  db:
    ports:
      - "5432:5432"

  meilisearch:
    environment:
      - MEILI_ENV=development
    ports:
      - "7700:7700"
