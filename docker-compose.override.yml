# Development overrides – build locally with bind-mount source for hot reload
services:
  proxy:
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    expose:
      - "3000"

  hebcal-service:
    build:
      context: ./hebcal-service
    volumes:
      - ./hebcal-service:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    expose:
      - "3001"
    command: ["node", "--watch", "src/index.js"]

  sefaria-service:
    build:
      context: ./sefaria-service
    volumes:
      - ./sefaria-service:/app
      - /app/node_modules
      - ./sefaria-data:/data/sefaria
    environment:
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
    expose:
      - "3002"
    command: ["node", "--watch", "src/index.js"]

  db:
    expose:
      - "5432"

  meilisearch:
    environment:
      - MEILI_ENV=development
    expose:
      - "7700"
