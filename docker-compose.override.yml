# Development overrides – build locally from source on top of the consolidated app layout
services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      - NODE_ENV=development
      - APP_DATA_DIR=/data
      - SEFARIA_DATA_DIR=/data/sefaria
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
    volumes:
      - ./app/src:/app/src
      - ./hebcal-service/src:/app/hebcal-service/src
      - ./sefaria-data:/data/sefaria
      - app_dev_data:/data

volumes:
  app_dev_data:
