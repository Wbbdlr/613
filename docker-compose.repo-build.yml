name: 613-home

services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8613}:8613"
    environment:
      - NODE_ENV=production
      - PORT=8613
      - DATABASE_URL=postgresql://sefaria:sefaria@db:5432/sefaria
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
      - SEFARIA_DATA_DIR=/data/sefaria
      - JWT_SECRET=${JWT_SECRET:-change_me_jwt_secret_in_production}
    volumes:
      - sefaria_data:/data/sefaria
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started

  db:
    build:
      context: ./db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sefaria
      - POSTGRES_PASSWORD=sefaria
      - POSTGRES_DB=sefaria
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
      - MEILI_ENV=production
    volumes:
      - meili_data:/meili_data
    expose:
      - "7700"

volumes:
  postgres_data:
  meili_data:
  sefaria_data: